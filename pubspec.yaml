name: projectphoenix
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.67+68

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^0.8.7+5
  file_picker: ^12.0.0-beta.5
  camera: ^0.12.0+1

  # Сеть
  dio: ^5.2.2
  package_info_plus: ^10.1.0
  url_launcher: ^6.3.1

  # Хранение токена
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0

  # Socket.io клиент для realtime чатов
  socket_io_client: ^3.1.4

  # UI / утилиты
  cupertino_icons: ^1.0.9
  device_info_plus: ^13.1.0
  crypto: ^3.0.7
  image: ^4.2.0
  audioplayers: ^6.7.1
  connectivity_plus: ^7.1.1
  flutter_contacts: ^2.2.1
  qr_flutter: ^4.1.0
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  record: ^7.0.0
  idb_shim: ^2.8.2+2
  share_plus: ^13.1.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  video_player: ^2.11.1
  crop_your_image: ^2.0.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0
  photo_manager: ^3.9.0
  google_fonts: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

dependency_overrides:
  audioplayers_android:
    path: third_party/flutter_plugins/audioplayers_android
  device_info_plus:
    path: third_party/flutter_plugins/device_info_plus
  package_info_plus:
    path: third_party/flutter_plugins/package_info_plus
  photo_manager:
    path: third_party/flutter_plugins/photo_manager
  share_plus:
    path: third_party/flutter_plugins/share_plus

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/generated/phoenix/app_icon_legacy.png"
  image_path_android: "assets/generated/phoenix/app_icon_legacy.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1a082c"
  adaptive_icon_foreground: "assets/generated/phoenix/app_icon_adaptive_foreground.png"
  adaptive_icon_foreground_inset: 8
  web:
    generate: true
    image_path: "assets/generated/phoenix/app_icon_legacy.png"
    background_color: "#1a082c"
    theme_color: "#1a082c"
  windows:
    generate: true
    image_path: "assets/generated/phoenix/app_icon_legacy.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/generated/phoenix/app_icon_legacy.png"

flutter_native_splash:
  android: true
  ios: false
  web: false
  color: "#1a082c"
  color_dark: "#1a082c"
  image: assets/generated/phoenix/app_icon_adaptive_foreground.png
  image_dark: assets/generated/phoenix/app_icon_adaptive_foreground.png
  android_gravity: center
  ios_content_mode: center
  fullscreen: true
  android_12:
    color: "#1a082c"
    color_dark: "#1a082c"
    image: assets/generated/phoenix/app_icon_adaptive_foreground.png
    image_dark: assets/generated/phoenix/app_icon_adaptive_foreground.png
    icon_background_color: "#1a082c"
    icon_background_color_dark: "#1a082c"

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon_source.png
    - assets/generated/phoenix/
    - assets/sounds/
