name: projectantitelegram
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^0.8.7+5
  file_picker: ^8.1.2

  # Сеть
  dio: ^5.2.2

  # Хранение токена
  shared_preferences: ^2.1.1
  flutter_secure_storage: ^10.0.0

  # Socket.io клиент для realtime чатов
  socket_io_client: ^3.1.4

  # UI / утилиты
  cupertino_icons: ^1.0.8
  device_info_plus: ^12.3.0
  crypto: ^3.0.7
  image: ^4.2.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  record: ^6.2.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon_source.png"
  image_path_android: "assets/app_icon_source.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1a082c"
  adaptive_icon_foreground: "assets/app_icon_source.png"
  adaptive_icon_foreground_inset: 8
  web:
    generate: true
    image_path: "assets/app_icon_source.png"
    background_color: "#1a082c"
    theme_color: "#1a082c"
  windows:
    generate: true
    image_path: "assets/app_icon_source.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/app_icon_source.png"

flutter_native_splash:
  android: true
  ios: false
  web: false
  color: "#1a082c"
  color_dark: "#1a082c"
  image: assets/app_icon_source.png
  image_dark: assets/app_icon_source.png
  android_gravity: center
  ios_content_mode: center
  fullscreen: true
  android_12:
    color: "#1a082c"
    color_dark: "#1a082c"
    image: assets/app_icon_source.png
    image_dark: assets/app_icon_source.png
    icon_background_color: "#1a082c"
    icon_background_color_dark: "#1a082c"

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon_source.png
    - assets/sounds/
