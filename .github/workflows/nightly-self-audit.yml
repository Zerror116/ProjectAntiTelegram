name: Nightly Self-Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

jobs:
  self_audit:
    name: Security Nightly Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

      - name: Flutter integration_test (Linux desktop)
        run: |
          flutter config --enable-linux-desktop
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-dev libblkid-dev liblzma-dev ninja-build
          xvfb-run -a flutter test integration_test -d linux

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Server syntax check
        run: |
          find server/src -name "*.js" -print0 | xargs -0 -n1 node --check
          find server/scripts -name "*.js" -print0 | xargs -0 -n1 node --check

      - name: Start backend for API smoke
        env:
          NODE_ENV: production
          PORT: 3000
          ENFORCE_HTTPS: true
          TRUST_PROXY_HOPS: 1
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_SECRET_VERSION: ${{ secrets.JWT_SECRET_VERSION }}
          JWT_SECRET_KEYRING: ${{ secrets.JWT_SECRET_KEYRING }}
          CHAT_MEDIA_TOKEN_SECRET: ${{ secrets.CHAT_MEDIA_TOKEN_SECRET }}
          CHAT_MEDIA_TOKEN_SECRET_VERSION: ${{ secrets.CHAT_MEDIA_TOKEN_SECRET_VERSION }}
          CHAT_MEDIA_TOKEN_KEYRING: ${{ secrets.CHAT_MEDIA_TOKEN_KEYRING }}
          UPLOADS_TOKEN_SECRET: ${{ secrets.UPLOADS_TOKEN_SECRET }}
          UPLOADS_TOKEN_SECRET_VERSION: ${{ secrets.UPLOADS_TOKEN_SECRET_VERSION }}
          UPLOADS_TOKEN_KEYRING: ${{ secrets.UPLOADS_TOKEN_KEYRING }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm --prefix server run start > /tmp/pat-server.log 2>&1 &
          echo $! > /tmp/pat-server.pid
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:3000/health >/dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time"
          tail -n 200 /tmp/pat-server.log || true
          exit 1

      - name: Run critical integration smoke (optional)
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_TENANT_CODE: ${{ secrets.E2E_TENANT_CODE }}
          E2E_VIEW_ROLE: ${{ secrets.E2E_VIEW_ROLE }}
          E2E_TOTP_CODE: ${{ secrets.E2E_TOTP_CODE }}
          E2E_BACKUP_CODE: ${{ secrets.E2E_BACKUP_CODE }}
          E2E_DIRECT_QUERY: ${{ secrets.E2E_DIRECT_QUERY }}
        run: |
          if [ -z "${E2E_EMAIL}" ] || [ -z "${E2E_PASSWORD}" ]; then
            echo "Skip critical integration smoke: E2E credentials are not configured"
            exit 0
          fi
          npm --prefix server run test:critical

      - name: Run phone-access E2E flow (optional)
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_OWNER_EMAIL: ${{ secrets.E2E_OWNER_EMAIL }}
          E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
          E2E_DUP_INVITE_CODE: ${{ secrets.E2E_DUP_INVITE_CODE }}
          E2E_TENANT_CODE: ${{ secrets.E2E_TENANT_CODE }}
        run: |
          if [ -z "${E2E_OWNER_EMAIL}" ] || [ -z "${E2E_OWNER_PASSWORD}" ] || [ -z "${E2E_DUP_INVITE_CODE}" ]; then
            echo "Skip phone-access E2E: owner creds/invite are not configured"
            exit 0
          fi
          npm --prefix server run test:phone-access:e2e

      - name: Run subscription-guard E2E flow (optional)
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_CREATOR_EMAIL: ${{ secrets.E2E_CREATOR_EMAIL }}
          E2E_CREATOR_PASSWORD: ${{ secrets.E2E_CREATOR_PASSWORD }}
          E2E_CREATOR_TOTP_CODE: ${{ secrets.E2E_CREATOR_TOTP_CODE }}
          E2E_CREATOR_BACKUP_CODE: ${{ secrets.E2E_CREATOR_BACKUP_CODE }}
          E2E_STAFF_EMAIL: ${{ secrets.E2E_STAFF_EMAIL }}
          E2E_STAFF_PASSWORD: ${{ secrets.E2E_STAFF_PASSWORD }}
          E2E_STAFF_TOTP_CODE: ${{ secrets.E2E_STAFF_TOTP_CODE }}
          E2E_STAFF_BACKUP_CODE: ${{ secrets.E2E_STAFF_BACKUP_CODE }}
          E2E_CLIENT_EMAIL: ${{ secrets.E2E_CLIENT_EMAIL }}
          E2E_CLIENT_PASSWORD: ${{ secrets.E2E_CLIENT_PASSWORD }}
          E2E_CLIENT_TOTP_CODE: ${{ secrets.E2E_CLIENT_TOTP_CODE }}
          E2E_CLIENT_BACKUP_CODE: ${{ secrets.E2E_CLIENT_BACKUP_CODE }}
          E2E_TENANT_CODE: ${{ secrets.E2E_TENANT_CODE }}
        run: |
          if [ -z "${E2E_CREATOR_EMAIL}" ] || [ -z "${E2E_CREATOR_PASSWORD}" ] || [ -z "${E2E_STAFF_EMAIL}" ] || [ -z "${E2E_STAFF_PASSWORD}" ] || [ -z "${E2E_CLIENT_EMAIL}" ] || [ -z "${E2E_CLIENT_PASSWORD}" ]; then
            echo "Skip subscription-guard E2E: creator/staff/client credentials are not configured"
            exit 0
          fi
          npm --prefix server run test:subscription-guard:e2e

      - name: Run order-pipeline E2E flow (optional)
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_WORKER_EMAIL: ${{ secrets.E2E_WORKER_EMAIL }}
          E2E_WORKER_PASSWORD: ${{ secrets.E2E_WORKER_PASSWORD }}
          E2E_WORKER_TOTP_CODE: ${{ secrets.E2E_WORKER_TOTP_CODE }}
          E2E_WORKER_BACKUP_CODE: ${{ secrets.E2E_WORKER_BACKUP_CODE }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_ADMIN_TOTP_CODE: ${{ secrets.E2E_ADMIN_TOTP_CODE }}
          E2E_ADMIN_BACKUP_CODE: ${{ secrets.E2E_ADMIN_BACKUP_CODE }}
          E2E_CLIENT_EMAIL: ${{ secrets.E2E_CLIENT_EMAIL }}
          E2E_CLIENT_PASSWORD: ${{ secrets.E2E_CLIENT_PASSWORD }}
          E2E_CLIENT_TOTP_CODE: ${{ secrets.E2E_CLIENT_TOTP_CODE }}
          E2E_CLIENT_BACKUP_CODE: ${{ secrets.E2E_CLIENT_BACKUP_CODE }}
          E2E_TENANT_CODE: ${{ secrets.E2E_TENANT_CODE }}
        run: |
          if [ -z "${E2E_ADMIN_EMAIL}" ] || [ -z "${E2E_ADMIN_PASSWORD}" ] || [ -z "${E2E_CLIENT_EMAIL}" ] || [ -z "${E2E_CLIENT_PASSWORD}" ]; then
            echo "Skip order-pipeline E2E: admin/client credentials are not configured"
            exit 0
          fi
          npm --prefix server run test:order-pipeline:e2e

      - name: Run tenant-isolation E2E flow (optional)
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_REQUIRE_TENANT_ISOLATION: "1"
          E2E_TENANT_A_EMAIL: ${{ secrets.E2E_TENANT_A_EMAIL }}
          E2E_TENANT_A_PASSWORD: ${{ secrets.E2E_TENANT_A_PASSWORD }}
          E2E_TENANT_A_CODE: ${{ secrets.E2E_TENANT_A_CODE }}
          E2E_TENANT_A_TOTP_CODE: ${{ secrets.E2E_TENANT_A_TOTP_CODE }}
          E2E_TENANT_A_BACKUP_CODE: ${{ secrets.E2E_TENANT_A_BACKUP_CODE }}
          E2E_TENANT_B_EMAIL: ${{ secrets.E2E_TENANT_B_EMAIL }}
          E2E_TENANT_B_PASSWORD: ${{ secrets.E2E_TENANT_B_PASSWORD }}
          E2E_TENANT_B_CODE: ${{ secrets.E2E_TENANT_B_CODE }}
          E2E_TENANT_B_TOTP_CODE: ${{ secrets.E2E_TENANT_B_TOTP_CODE }}
          E2E_TENANT_B_BACKUP_CODE: ${{ secrets.E2E_TENANT_B_BACKUP_CODE }}
        run: |
          if [ -z "${E2E_TENANT_A_EMAIL}" ] || [ -z "${E2E_TENANT_A_PASSWORD}" ] || [ -z "${E2E_TENANT_B_EMAIL}" ] || [ -z "${E2E_TENANT_B_PASSWORD}" ]; then
            echo "Skip tenant-isolation E2E: tenant A/B credentials are not configured"
            exit 0
          fi
          npm --prefix server run test:tenant-isolation:e2e

      - name: Run tenant-regression E2E flow (optional)
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_REQUIRE_TENANT_REGRESSION: "1"
          E2E_TENANT_ISOLATION_REQUIRE_FULL: ${{ secrets.E2E_TENANT_ISOLATION_REQUIRE_FULL }}
          E2E_TENANT_A_EMAIL: ${{ secrets.E2E_TENANT_A_EMAIL }}
          E2E_TENANT_A_PASSWORD: ${{ secrets.E2E_TENANT_A_PASSWORD }}
          E2E_TENANT_A_CODE: ${{ secrets.E2E_TENANT_A_CODE }}
          E2E_TENANT_A_TOTP_CODE: ${{ secrets.E2E_TENANT_A_TOTP_CODE }}
          E2E_TENANT_A_BACKUP_CODE: ${{ secrets.E2E_TENANT_A_BACKUP_CODE }}
          E2E_TENANT_B_EMAIL: ${{ secrets.E2E_TENANT_B_EMAIL }}
          E2E_TENANT_B_PASSWORD: ${{ secrets.E2E_TENANT_B_PASSWORD }}
          E2E_TENANT_B_CODE: ${{ secrets.E2E_TENANT_B_CODE }}
          E2E_TENANT_B_TOTP_CODE: ${{ secrets.E2E_TENANT_B_TOTP_CODE }}
          E2E_TENANT_B_BACKUP_CODE: ${{ secrets.E2E_TENANT_B_BACKUP_CODE }}
        run: |
          if [ -z "${E2E_TENANT_A_EMAIL}" ] || [ -z "${E2E_TENANT_A_PASSWORD}" ] || [ -z "${E2E_TENANT_B_EMAIL}" ] || [ -z "${E2E_TENANT_B_PASSWORD}" ]; then
            echo "Skip tenant-regression E2E: tenant A/B credentials are not configured"
            exit 0
          fi
          npm --prefix server run test:tenant-regression:e2e

      - name: Run device-limit E2E flow (optional)
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_REQUIRE_DEVICE_LIMIT: "1"
          E2E_DEVICE_LIMIT_INVITE_CODE: ${{ secrets.E2E_DEVICE_LIMIT_INVITE_CODE }}
        run: |
          if [ -z "${E2E_DEVICE_LIMIT_INVITE_CODE}" ]; then
            echo "Skip device-limit E2E: invite code is not configured"
            exit 0
          fi
          npm --prefix server run test:device-limit:e2e

      - name: Run full E2E regression bundle (optional)
        env:
          E2E_RUN_FULL_REGRESSION: ${{ secrets.E2E_RUN_FULL_REGRESSION }}
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_TENANT_CODE: ${{ secrets.E2E_TENANT_CODE }}
          E2E_OWNER_EMAIL: ${{ secrets.E2E_OWNER_EMAIL }}
          E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
          E2E_DUP_INVITE_CODE: ${{ secrets.E2E_DUP_INVITE_CODE }}
          E2E_CREATOR_EMAIL: ${{ secrets.E2E_CREATOR_EMAIL }}
          E2E_CREATOR_PASSWORD: ${{ secrets.E2E_CREATOR_PASSWORD }}
          E2E_STAFF_EMAIL: ${{ secrets.E2E_STAFF_EMAIL }}
          E2E_STAFF_PASSWORD: ${{ secrets.E2E_STAFF_PASSWORD }}
          E2E_CLIENT_EMAIL: ${{ secrets.E2E_CLIENT_EMAIL }}
          E2E_CLIENT_PASSWORD: ${{ secrets.E2E_CLIENT_PASSWORD }}
          E2E_WORKER_EMAIL: ${{ secrets.E2E_WORKER_EMAIL }}
          E2E_WORKER_PASSWORD: ${{ secrets.E2E_WORKER_PASSWORD }}
          E2E_TENANT_A_EMAIL: ${{ secrets.E2E_TENANT_A_EMAIL }}
          E2E_TENANT_A_PASSWORD: ${{ secrets.E2E_TENANT_A_PASSWORD }}
          E2E_TENANT_A_CODE: ${{ secrets.E2E_TENANT_A_CODE }}
          E2E_TENANT_B_EMAIL: ${{ secrets.E2E_TENANT_B_EMAIL }}
          E2E_TENANT_B_PASSWORD: ${{ secrets.E2E_TENANT_B_PASSWORD }}
          E2E_TENANT_B_CODE: ${{ secrets.E2E_TENANT_B_CODE }}
          E2E_DEVICE_LIMIT_INVITE_CODE: ${{ secrets.E2E_DEVICE_LIMIT_INVITE_CODE }}
          E2E_REQUIRE_FULL: ${{ secrets.E2E_REQUIRE_FULL }}
        run: |
          if [ "${E2E_RUN_FULL_REGRESSION}" != "1" ]; then
            echo "Skip full E2E regression bundle: E2E_RUN_FULL_REGRESSION != 1"
            exit 0
          fi
          npm --prefix server run test:e2e:full

      - name: Run nightly self-audit
        env:
          NODE_ENV: production
          ENFORCE_HTTPS: true
          TRUST_PROXY_HOPS: 1
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_SECRET_VERSION: ${{ secrets.JWT_SECRET_VERSION }}
          JWT_SECRET_KEYRING: ${{ secrets.JWT_SECRET_KEYRING }}
          CHAT_MEDIA_TOKEN_SECRET: ${{ secrets.CHAT_MEDIA_TOKEN_SECRET }}
          CHAT_MEDIA_TOKEN_SECRET_VERSION: ${{ secrets.CHAT_MEDIA_TOKEN_SECRET_VERSION }}
          CHAT_MEDIA_TOKEN_KEYRING: ${{ secrets.CHAT_MEDIA_TOKEN_KEYRING }}
          UPLOADS_TOKEN_SECRET: ${{ secrets.UPLOADS_TOKEN_SECRET }}
          UPLOADS_TOKEN_SECRET_VERSION: ${{ secrets.UPLOADS_TOKEN_SECRET_VERSION }}
          UPLOADS_TOKEN_KEYRING: ${{ secrets.UPLOADS_TOKEN_KEYRING }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run --prefix server audit:self

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/pat-server.pid ]; then
            kill "$(cat /tmp/pat-server.pid)" || true
          fi
          pkill -f "node src/index.js" || true

      - name: Upload self-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-self-audit-report
          path: |
            server/audit/nightly-self-audit.md
            server/audit/tenant-isolation-regression.md
            server/audit/e2e-full-regression.md
