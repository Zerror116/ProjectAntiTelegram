name: Desktop Release Builds

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for artifacts (example: v1.0.2)"
        required: false
        default: "manual"
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release --dart-define=FENIX_NATIVE_RELEASE_API_BASE_URL=https://garphoenix.com --dart-define=FENIX_API_BASE_URL=https://garphoenix.com

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Pack Windows installer (.exe)
        shell: pwsh
        run: |
          $Label = if ("${{ github.ref_name }}" -ne "") { "${{ github.ref_name }}" } else { "${{ inputs.version }}" }
          New-Item -Path "dist" -ItemType Directory -Force | Out-Null
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "windows/installer/projectphoenix.iss" `
            "/DMyAppVersion=$Label" `
            "/DMySourceDir=build\windows\x64\runner\Release" `
            "/DMyOutputDir=dist" `
            "/DMyBaseName=projectphoenix-setup-$Label" `
            "/DMyAppExeName=projectphoenix.exe"
          Copy-Item "dist/projectphoenix-setup-$Label.exe" "dist/projectphoenix-setup.exe" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: projectphoenix-windows
          path: dist/projectphoenix-setup*.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release --dart-define=FENIX_NATIVE_RELEASE_API_BASE_URL=https://garphoenix.com --dart-define=FENIX_API_BASE_URL=https://garphoenix.com

      - name: Pack macOS app and dmg
        run: |
          LABEL="${GITHUB_REF_NAME:-${{ inputs.version }}}"
          mkdir -p dist
          APP_PATH="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in build output" >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/projectphoenix-macos-${LABEL}.zip"
          hdiutil create -volname "ProjectPhoenix" -srcfolder "$APP_PATH" -ov -format UDZO "dist/projectphoenix-${LABEL}.dmg"
          cp "dist/projectphoenix-${LABEL}.dmg" "dist/projectphoenix.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: projectphoenix-macos
          path: |
            dist/projectphoenix-macos-*.zip
            dist/projectphoenix*.dmg

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: projectphoenix-windows
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: projectphoenix-macos
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.exe
            dist/*.dmg
