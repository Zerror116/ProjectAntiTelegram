name: Security CI

on:
  push:
  pull_request:

jobs:
  flutter_checks:
    name: Flutter Analyze and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

  server_checks:
    name: Server Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Server lint
        run: npm run --prefix server lint

      - name: JavaScript syntax check
        run: find server/src -name "*.js" -print0 | xargs -0 -n1 node --check

      - name: NPM audit (critical)
        run: npm audit --prefix server --omit=dev --audit-level=critical
