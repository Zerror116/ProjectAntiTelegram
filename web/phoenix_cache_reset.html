<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Сброс кэша Феникс</title>
  <style>
    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e5eefc;
      font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(90vw, 420px);
      padding: 28px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 22px;
      background: rgba(15, 23, 42, 0.82);
      box-shadow: 0 24px 54px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    p {
      margin: 0;
      color: rgba(226, 232, 240, 0.78);
    }
  </style>
</head>
<body>
  <main>
    <h1>Обновляем Феникс</h1>
    <p id="status">Очищаем локальный web-кэш...</p>
  </main>
  <script>
    (async function resetPhoenixCache() {
      const status = document.getElementById('status');
      const setStatus = function (text) {
        if (status) status.textContent = text;
      };

      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(function (registration) {
            return registration.unregister();
          }));
        }

        if ('caches' in window) {
          const names = await caches.keys();
          await Promise.all(names.map(function (name) {
            return caches.delete(name);
          }));
        }

        setStatus('Готово. Открываем свежую сборку...');
      } catch (_) {
        setStatus('Кэш сброшен частично. Всё равно открываем приложение...');
      }

      const nextUrl = new URL('/', window.location.origin);
      nextUrl.searchParams.set('fresh', Date.now().toString());
      window.location.replace(nextUrl.toString());
    })();
  </script>
</body>
</html>
