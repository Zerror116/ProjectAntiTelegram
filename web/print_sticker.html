<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Наклейка Феникс</title>
    <style>
      @page {
        size: 115mm 70mm;
        margin: 0;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 115mm;
        height: 70mm;
        background: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial,
          sans-serif;
        overflow: hidden;
      }

      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .screen-toolbar {
        position: fixed;
        right: 14px;
        bottom: 14px;
        display: flex;
        gap: 10px;
        z-index: 20;
      }

      .screen-btn {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font: 600 14px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial,
          sans-serif;
        cursor: pointer;
      }

      .screen-btn--primary {
        background: #111;
        color: #fff;
      }

      .screen-btn--secondary {
        background: #ececec;
        color: #111;
      }

      .page {
        width: 115mm;
        height: 70mm;
        overflow: hidden;
        position: relative;
      }

      .sheet {
        width: 108.5mm;
        height: 63.5mm;
        margin: 2.1mm 3.2mm 4.4mm 2.1mm;
        box-sizing: border-box;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
        padding: 2.2mm 1.8mm 2.3mm 1.8mm;
      }

      .sheet::before {
        content: "";
        position: absolute;
        inset: 0;
        border: 0.7mm solid #000;
        box-sizing: border-box;
        pointer-events: none;
      }

      .content {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        z-index: 1;
        text-align: center;
      }

      .phone {
        width: 100%;
        font-size: 26mm;
        line-height: 0.95;
        font-weight: 900;
        letter-spacing: 0.03mm;
        white-space: nowrap;
        overflow: hidden;
        text-align: center;
      }

      .name {
        margin-top: 1.6mm;
        width: 100%;
        font-size: 24mm;
        line-height: 0.98;
        font-weight: 800;
        word-break: break-word;
        text-align: center;
      }

      .title {
        margin-top: 1.4mm;
        width: 100%;
        font-size: 10.3mm;
        line-height: 1.0;
        font-weight: 700;
        word-break: break-word;
        text-align: center;
      }

      .price {
        margin-top: 0.9mm;
        width: 100%;
        font-size: 11.8mm;
        line-height: 0.98;
        font-weight: 900;
        white-space: nowrap;
        overflow: hidden;
        text-align: center;
      }

      .footer {
        margin-top: auto;
        align-self: flex-end;
        text-align: right;
        font-size: 3.5mm;
        font-weight: 800;
        color: #222;
        position: relative;
        z-index: 1;
      }

      .hidden {
        display: none !important;
      }

      @media print {
        .screen-toolbar {
          display: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="sheet">
        <div class="content" id="sticker-content">
          <div class="phone" id="sticker-phone"></div>
          <div class="name" id="sticker-name"></div>
          <div class="title hidden" id="sticker-title"></div>
          <div class="price hidden" id="sticker-price"></div>
        </div>
        <div class="footer hidden" id="sticker-footer"></div>
      </div>
    </div>

    <div class="screen-toolbar">
      <button class="screen-btn screen-btn--secondary" id="close-button" type="button">
        Закрыть
      </button>
      <button class="screen-btn screen-btn--primary" id="print-button" type="button">
        Печать
      </button>
    </div>

    <script>
      (function () {
        let hasAutoPrintRun = false;

        function byId(id) {
          return document.getElementById(id);
        }

        function safeText(value) {
          return (value == null ? "" : String(value)).trim();
        }

        function toggleNode(node, visible, text) {
          if (!node) return;
          node.textContent = text || "";
          if (visible) {
            node.classList.remove("hidden");
          } else {
            node.classList.add("hidden");
          }
        }

        function fitElement(el, maxPx, minPx) {
          if (!el) return;
          let size = maxPx;
          el.style.fontSize = size + "px";
          while (
            size > minPx &&
            (el.scrollWidth > el.clientWidth || el.scrollHeight > el.clientHeight)
          ) {
            size -= 1;
            el.style.fontSize = size + "px";
          }
        }

        function fitSticker() {
          const content = byId("sticker-content");
          const phone = byId("sticker-phone");
          const name = byId("sticker-name");
          const title = byId("sticker-title");
          const price = byId("sticker-price");
          if (!content || !phone || !name) return;

          phone.style.fontSize = "";
          name.style.fontSize = "";
          if (title) title.style.fontSize = "";
          if (price) price.style.fontSize = "";

          fitElement(phone, 170, 52);
          fitElement(name, 144, 40);
          fitElement(title, 84, 24);
          fitElement(price, 96, 28);

          let attempts = 0;
          while (attempts < 60 && content.scrollHeight > content.clientHeight) {
            const nodes = [phone, name, title, price].filter(Boolean);
            for (const node of nodes) {
              const size = parseFloat(getComputedStyle(node).fontSize);
              const minimum =
                node === phone ? 52 : node === name ? 40 : node === price ? 28 : 24;
              node.style.fontSize = Math.max(minimum, size - 1) + "px";
            }
            attempts += 1;
          }
        }

        function applyPayload(payload) {
          const phone = safeText(payload.phone);
          const name = safeText(payload.name);
          const title = safeText(payload.productTitle);
          const price = safeText(payload.priceLabel);
          const footer = safeText(payload.footerText);
          const showFooter = payload.showFooter === true && footer.length > 0;

          byId("sticker-phone").textContent = phone;
          byId("sticker-name").textContent = name;
          toggleNode(byId("sticker-title"), title.length > 0, title);
          toggleNode(byId("sticker-price"), price.length > 0, price);
          toggleNode(byId("sticker-footer"), showFooter, footer);

          fitSticker();
          setTimeout(fitSticker, 50);
          setTimeout(function () {
            window.__PHOENIX_STICKER_READY__ = true;
            requestPrint();
          }, 80);
        }

        function requestPrint() {
          if (hasAutoPrintRun) return;
          hasAutoPrintRun = true;
          setTimeout(function () {
            fitSticker();
            window.focus();
            window.print();
          }, 120);
        }

        function readPayloadFromHash() {
          const raw = window.location.hash.replace(/^#/, "").trim();
          if (!raw) return null;
          try {
            return JSON.parse(decodeURIComponent(raw));
          } catch (_) {
            return null;
          }
        }

        window.__PHOENIX_STICKER_READY__ = false;
        const payload = readPayloadFromHash();
        if (payload) {
          applyPayload(payload);
        }

        window.addEventListener("resize", fitSticker);
        window.addEventListener("beforeprint", fitSticker);
        byId("print-button").addEventListener("click", function () {
          hasAutoPrintRun = false;
          requestPrint();
        });
        byId("close-button").addEventListener("click", function () {
          window.close();
        });
      })();
    </script>
  </body>
</html>
