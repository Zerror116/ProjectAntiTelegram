  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #1a082c;
          background-size: 100% 100%;

    .center {
      margin: 0;

      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;

    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {

    }

    .bottomLeft {

  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();

    }

  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    (function () {
      const buildVersionKey = 'projectphoenix-web-build-version';
      const reloadOnceKey = 'projectphoenix-web-reload-once';

      function appendFlutterBootstrap(versionToken) {
        const script = document.createElement('script');
        const token =
          (versionToken || '').toString().trim() ||
          Date.now().toString();
        script.src = `flutter_bootstrap.js?v=${encodeURIComponent(token)}`;
        script.async = true;
        document.body.appendChild(script);
      }

      async function readServerBuildVersion() {
        const resp = await fetch(`version.json?_ts=${Date.now()}`, {
          cache: 'no-store',
        });
        if (!resp.ok) return '';
        const data = await resp.json();
        return (data && data.version ? String(data.version) : '').trim();
      }

      async function clearOldWebCaches() {
        if ('serviceWorker' in navigator) {
          try {
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (const registration of registrations) {
              await registration.unregister();
            }
          } catch (_) {}
        }
        if ('caches' in window) {
          try {
            const cacheKeys = await caches.keys();
            await Promise.all(cacheKeys.map((key) => caches.delete(key)));
          } catch (_) {}
        }
      }

      (async function bootstrapWithAutoRefresh() {
        let serverVersion = '';
        try {
          serverVersion = await readServerBuildVersion();
        } catch (_) {}

        let previousVersion = '';
        let alreadyReloaded = false;
        try {
          previousVersion = localStorage.getItem(buildVersionKey) || '';
          alreadyReloaded = sessionStorage.getItem(reloadOnceKey) === '1';
        } catch (_) {}

        const shouldHardRefresh =
          previousVersion &&
          serverVersion &&
          previousVersion !== serverVersion &&
          !alreadyReloaded;

        if (shouldHardRefresh) {
          try {
            sessionStorage.setItem(reloadOnceKey, '1');
          } catch (_) {}
          await clearOldWebCaches();
          try {
            localStorage.setItem(buildVersionKey, serverVersion);
          } catch (_) {}
          window.location.reload();
          return;
        }

        try {
          sessionStorage.removeItem(reloadOnceKey);
          if (serverVersion) {
            localStorage.setItem(buildVersionKey, serverVersion);
          }
        } catch (_) {}

        appendFlutterBootstrap(serverVersion);
      })();
    })();
  </script>


</body></html>
