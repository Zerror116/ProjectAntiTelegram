# PycharmProjects/ProjectPhoenix/docker/docker-compose.yml
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: projectphoenix
      POSTGRES_PASSWORD: projectphoenix
      POSTGRES_DB: projectphoenix
    volumes:
      - db-data:/var/lib/postgresql/data
      - ../server/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://projectphoenix:projectphoenix@db:5432/projectphoenix
      JWT_SECRET: change_me_long_secret
      PORT: "3000"
    depends_on:
      - db
    ports:
      - "3000:3000"
    volumes:
      - ../server:/app
      - /app/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
